name: Build & Deploy to Infomaniak

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: infomaniak

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Build ───────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # ── 3. Deploy via FTP ──────────────────────────────────────────
      # Uploads only changed files (incremental), skips .env and sensitive files
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /sites/bergmann-florian.ch/    # ← adapt this path
          local-dir: ./build/                # ← adapter-node outputs to ./build
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
